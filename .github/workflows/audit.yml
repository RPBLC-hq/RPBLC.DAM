name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  push:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
  pull_request:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit
