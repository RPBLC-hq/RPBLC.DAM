[workspace]
members = [
    "crates/dam-core",
    "crates/dam-vault",
    "crates/dam-detect",
    "crates/dam-resolve",
    "crates/dam-mcp",
    "crates/dam-http",
    "crates/dam-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/alexyboyer/RPBLC.DAM"

[workspace.dependencies]
# Internal crates
dam-core = { path = "crates/dam-core" }
dam-vault = { path = "crates/dam-vault" }
dam-detect = { path = "crates/dam-detect" }
dam-resolve = { path = "crates/dam-resolve" }
dam-mcp = { path = "crates/dam-mcp" }
dam-http = { path = "crates/dam-http" }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Async
tokio = { version = "1", features = ["full"] }

# Crypto
aes-gcm = "0.10"
rand = "0.8"
zeroize = { version = "1", features = ["derive"] }
argon2 = "0.5"
sha2 = "0.10"
hex = "0.4"

# Database
rusqlite = { version = "0.31", features = ["bundled"] }

# Keychain
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }

# Detection
regex = "1"
once_cell = "1"

# MCP
rmcp = { version = "0.1.5", features = ["server", "transport-io", "macros"] }

# HTTP
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
reqwest = { version = "0.12", features = ["stream", "json"] }
futures-util = "0.3"
bytes = "1"
async-stream = "0.3"

# CLI
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
colored = "2"
dirs = "5"

# Error handling
thiserror = "2"
anyhow = "1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
tempfile = "3"

[profile.release]
lto = true
strip = true
codegen-units = 1
